<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

{% if form.errors %}
    <p style="color:red">Wrong username or password.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

<p>
    Don't have an account?
    <a href="{% url 'register' %}">Click here to register</a>
</p>

</body>
</html>
